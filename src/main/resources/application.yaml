spring:
  application:
    name: Bank Application

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_url}
    username: ${DB_username}
    password: ${DB_password}
    driver-class-name: org.postgresql.Driver
  jpa:
      hibernate:
        ddl-auto: update
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect